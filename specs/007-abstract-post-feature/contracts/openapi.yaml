openapi: 3.0.3
info:
  title: Abstract Post System API
  description: Extensible post management system enabling specialized content platforms
  version: 1.0.0
  contact:
    name: Echoforge Team
servers:
  - url: /api/v1
    description: API v1 base path

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Post:
      type: object
      required: [id, title, content, authorId, postTypeId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 1048576
        authorId:
          type: string
          format: uuid
        postTypeId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, scheduled, published, archived, pending_approval]
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        publishedAt:
          type: string
          format: date-time
          nullable: true
        viewCount:
          type: integer
          minimum: 0
        isApproved:
          type: boolean
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        metadata:
          type: object
          additionalProperties: true
    
    PostType:
      type: object
      required: [id, name, displayName, isActive, requiresApproval, allowsScheduling, allowsAttachments]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        displayName:
          type: string
          maxLength: 100
        description:
          type: string
        fieldDefinitions:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        requiresApproval:
          type: boolean
        allowsScheduling:
          type: boolean
        allowsAttachments:
          type: boolean
        postCount:
          type: integer
          minimum: 0

    Category:
      type: object
      required: [id, name, slug, isActive, postCount, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
        description:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
        postCount:
          type: integer
          minimum: 0
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Tag:
      type: object
      required: [id, name, slug, usageCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
        description:
          type: string
        usageCount:
          type: integer
          minimum: 0

    Attachment:
      type: object
      required: [id, postId, fileName, fileSize, mimeType, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
        postId:
          type: string
          format: uuid
        fileName:
          type: string
          maxLength: 255
        fileSize:
          type: integer
          maximum: 104857600
        mimeType:
          type: string
          maxLength: 100
        altText:
          type: string
          maxLength: 255
        sortOrder:
          type: integer
          minimum: 0
        uploadedAt:
          type: string
          format: date-time
        url:
          type: string
          format: uri

    CreatePostRequest:
      type: object
      required: [title, content, postTypeId]
      properties:
        title:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 1048576
        postTypeId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, scheduled, published]
          default: draft
        scheduledAt:
          type: string
          format: date-time
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        metadata:
          type: object
          additionalProperties: true

    PaginatedPostsResponse:
      type: object
      required: [posts, pagination]
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        pagination:
          $ref: '#/components/schemas/Pagination'
        filters:
          type: object
          additionalProperties: true

    Pagination:
      type: object
      required: [page, limit, total, totalPages, hasNext, hasPrev]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, timestamp, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            timestamp:
              type: string
              format: date-time
            requestId:
              type: string
              format: uuid

paths:
  /posts:
    get:
      summary: List posts
      description: Retrieve paginated list of posts with filtering and sorting
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [published, draft, archived]
        - name: postTypeId
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, publishedAt, title, viewCount]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create post
      description: Create a new post with specified type and content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Business rule violations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /posts/{id}:
    get:
      summary: Get post
      description: Retrieve a single post by ID with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update post
      description: Update an existing post (creates new version)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Post updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete post
      description: Soft delete a post (sets status to archived)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Post deleted successfully
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /post-types:
    get:
      summary: List post types
      description: Retrieve all available post types
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  postTypes:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostType'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories:
    get:
      summary: List categories
      description: Retrieve hierarchical category tree
      parameters:
        - name: parentId
          in: query
          schema:
            type: string
            format: uuid
        - name: includeEmpty
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'

    post:
      summary: Create category
      description: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                slug:
                  type: string
                  maxLength: 100
                description:
                  type: string
                parentId:
                  type: string
                  format: uuid
                sortOrder:
                  type: integer
                  minimum: 0
                  default: 0
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /tags:
    get:
      summary: List tags
      description: Retrieve all tags with usage statistics
      parameters:
        - name: popular
          in: query
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'

    post:
      summary: Create tag
      description: Create a new tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 50
                slug:
                  type: string
                  maxLength: 50
                color:
                  type: string
                  pattern: '^#[0-9A-Fa-f]{6}$'
                description:
                  type: string
      responses:
        '201':
          description: Tag created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'