# Echoforge Configuration Template
# Multi-site backend configuration with site_id isolation

# Server Configuration
server:
  port: 8080
  mode: development  # development, production (maps to Gin modes)
  host: localhost
  timeout_seconds: 30

# Application Configuration  
app:
  site_id: "default"                 # REQUIRED: Unique identifier for this site
  name: "Echoforge Site"            # Display name for this site
  version: "0.1.0"                  # Semantic versioning for this site
  log_level: info                   # debug, info, warn, error
  environment: development          # development, staging, production

# Database Configuration
database:
  url: "postgres://postgres:password@localhost:5432/echoforge?sslmode=disable"  # Env override: DATABASE_URL
  driver: postgres
  host: localhost
  port: 5432
  name: echoforge
  user: postgres
  password: password
  sslmode: disable                  # disable, require, verify-ca, verify-full
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime_minutes: 30
  
  # Site isolation - all queries will include WHERE site_id = ?
  enable_site_isolation: true

# Authentication Configuration
jwt:
  secret: "super-secret-key-change-in-prod"  # Min 32 chars, rotate quarterly
  expires_in: 24                    # Hours
  
auth:
  bcrypt_cost: 12                   # 10-15, higher = more secure but slower
  session_timeout_minutes: 120
  max_login_attempts: 5
  lockout_duration_minutes: 15

# Security Configuration
security:
  cors_enabled: true
  cors_origins: ["http://localhost:3000", "http://localhost:8080"]
  rate_limit_enabled: true
  rate_limit_requests_per_minute: 100
  request_timeout_seconds: 30
  max_request_size_mb: 10

# Logging Configuration
logging:
  level: info                       # debug, info, warn, error
  format: json                      # json, console
  output: stdout                    # stdout, stderr, file

# Multi-Site Configuration Examples
# Viper usage: app_site_id := viper.GetString("app.site_id")
#             db.Where("site_id = ?", app_site_id).Find(&users)

# sites:
#   blog:
#     site_id: "blog-site"
#     name: "My Blog"
#     database:
#       name: "echoforge_blog"
#   manga:
#     site_id: "manga-site"  
#     name: "Manga Reader"
#     database:
#       name: "echoforge_manga"

# Performance Configuration
performance:
  enable_caching: false
  cache_ttl_minutes: 60
  max_concurrent_requests: 1000
  worker_pool_size: 10

# Development Configuration
development:
  hot_reload: true
  debug_sql: false
  profile_enabled: false

# Feature Flags
features:
  user_registration: true
  admin_panel: true
  api_documentation: true